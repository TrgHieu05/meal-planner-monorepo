name: Pull Request CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      EXPO_PUBLIC_API_BASE_URL: https://api-staging.example.com
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: web-client-id
      GOOGLE_WEB_CLIENT_ID: web-client-id
      JWT_SECRET: test-secret
      JWT_EXPIRES_IN: 7d
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      NEON_PRODUCTION_BRANCH_ID: ${{ vars.NEON_PRODUCTION_BRANCH_ID }}
      NEON_DATABASE_NAME: neondb
      NEON_ROLE_NAME: neondb_owner
      CI_PREVIEW_BRANCH_NAME: ci/pr-${{ github.event.pull_request.number }}-${{ github.run_id }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Validate CI preview DB prerequisites
        run: |
          required_values=(
            NEON_API_KEY
            NEON_PROJECT_ID
            NEON_PRODUCTION_BRANCH_ID
            CI_PREVIEW_BRANCH_NAME
          )

          for name in "${required_values[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub variable or secret: ${name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute CI preview branch expiration
        id: ci_preview_expiration
        run: |
          echo "expires_at=$(date -u --date '+1 day' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon schema-only CI branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ env.CI_PREVIEW_BRANCH_NAME }}
          parent_branch: ${{ env.NEON_PRODUCTION_BRANCH_ID }}
          branch_type: schema-only
          database: ${{ env.NEON_DATABASE_NAME }}
          role: ${{ env.NEON_ROLE_NAME }}
          prisma: true
          expires_at: ${{ steps.ci_preview_expiration.outputs.expires_at }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Mask CI preview database URLs
        run: |
          echo "::add-mask::${{ steps.create_neon_branch.outputs.db_url }}"
          echo "::add-mask::${{ steps.create_neon_branch.outputs.db_url_pooled }}"

      - name: Inject CI DATABASE_URL from Neon branch
        run: |
          echo "DATABASE_URL=${{ steps.create_neon_branch.outputs.db_url }}" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Build shared package
        run: pnpm run build:shared

      - name: Build backend
        run: pnpm --filter main-backend run build

      - name: Run backend unit tests
        run: pnpm --filter main-backend exec jest --runInBand --ci

      - name: Run backend e2e tests
        run: pnpm --filter main-backend exec jest --config ./test/jest-e2e.json --runInBand --ci

      - name: Run mobile tests
        run: pnpm --filter mobile-app exec jest --config ./jest.config.js --runInBand --ci

      - name: Delete Neon CI preview branch
        if: ${{ always() && steps.create_neon_branch.outcome == 'success' }}
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ steps.create_neon_branch.outputs.branch_id }}
          api_key: ${{ env.NEON_API_KEY }}