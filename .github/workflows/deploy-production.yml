name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-production-backend:
    name: Deploy Production Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME_PRODUCTION: ${{ vars.FLY_APP_NAME_PRODUCTION }}
      FLY_CONFIG_PATH_PRODUCTION: ${{ vars.FLY_CONFIG_PATH_PRODUCTION }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Validate production prerequisites
        run: |
          required_values=(
            FLY_API_TOKEN
            FLY_APP_NAME_PRODUCTION
            FLY_CONFIG_PATH_PRODUCTION
          )

          for name in "${required_values[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub variable or secret: ${name}"
              exit 1
            fi
          done

          if [[ ! -f "${FLY_CONFIG_PATH_PRODUCTION}" ]]; then
            echo "::error::Fly production config file not found at ${FLY_CONFIG_PATH_PRODUCTION}"
            exit 1
          fi

          if [[ ! -s "${FLY_CONFIG_PATH_PRODUCTION}" ]]; then
            echo "::error::Fly production config file is empty at ${FLY_CONFIG_PATH_PRODUCTION}. Complete this file before using deploy-production.yml."
            exit 1
          fi

          if ! grep -Eq 'release_command' "${FLY_CONFIG_PATH_PRODUCTION}"; then
            echo "::error::${FLY_CONFIG_PATH_PRODUCTION} must define a release_command so Prisma production migrations run before the app receives traffic."
            exit 1
          fi

          echo "PRODUCTION_HEALTHCHECK_URL=https://${FLY_APP_NAME_PRODUCTION}.fly.dev/api/health" >> "$GITHUB_ENV"

      - name: Ensure Fly production app exists
        run: |
          if flyctl status -a "$FLY_APP_NAME_PRODUCTION" >/dev/null 2>&1; then
            echo "Fly app already exists: $FLY_APP_NAME_PRODUCTION"
            exit 0
          fi

          echo "Fly app not found. Creating: $FLY_APP_NAME_PRODUCTION"
          if flyctl apps create "$FLY_APP_NAME_PRODUCTION" >/dev/null; then
            echo "Fly app created: $FLY_APP_NAME_PRODUCTION"
            exit 0
          fi

          if flyctl status -a "$FLY_APP_NAME_PRODUCTION" >/dev/null 2>&1; then
            echo "Fly app became available after create attempt: $FLY_APP_NAME_PRODUCTION"
            exit 0
          fi

          echo "::error::Failed to create Fly production app: $FLY_APP_NAME_PRODUCTION"
          exit 1

      - name: Deploy backend to Fly production
        run: |
          flyctl deploy \
            --remote-only \
            --app "$FLY_APP_NAME_PRODUCTION" \
            --config "$FLY_CONFIG_PATH_PRODUCTION"

      - name: Smoke check production health endpoint
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error "$PRODUCTION_HEALTHCHECK_URL" | tee production-health.json >/dev/null; then
              exit 0
            fi

            if [[ "$attempt" == "12" ]]; then
              echo "::error::Production health check failed at $PRODUCTION_HEALTHCHECK_URL"
              exit 1
            fi

            sleep 10
          done

      - name: Upload production health artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-backend-health-${{ github.run_id }}
          path: production-health.json

      - name: Write deployment summary
        run: |
          {
            echo "## Production backend deployed"
            echo
            echo "- Fly app: ${FLY_APP_NAME_PRODUCTION}"
            echo "- Health endpoint: ${PRODUCTION_HEALTHCHECK_URL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-mobile-production:
    name: Build Mobile Production APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      MOBILE_APP_DIR: apps/mobile-app
      EAS_PLATFORM: android
      EAS_PROFILE: production
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate production mobile prerequisites
        run: |
          required_values=(
            EXPO_TOKEN
            EXPO_PUBLIC_API_BASE_URL
            EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID
          )

          for name in "${required_values[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub variable or secret: ${name}"
              exit 1
            fi
          done

          if [[ ! -f "$MOBILE_APP_DIR/eas.json" ]]; then
            echo "::error::Missing EAS config at $MOBILE_APP_DIR/eas.json"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const easPath = path.join(process.env.GITHUB_WORKSPACE, process.env.MOBILE_APP_DIR, 'eas.json');
          const easConfig = JSON.parse(fs.readFileSync(easPath, 'utf8'));
          const buildProfile = easConfig?.build?.[process.env.EAS_PROFILE];

          if (!buildProfile) {
            throw new Error(`Missing build.${process.env.EAS_PROFILE} in ${easPath}`);
          }

          const buildType = buildProfile?.android?.buildType ?? 'aab';
          const easEnvironment = buildProfile?.environment ?? '';

          if (buildType !== 'apk') {
            throw new Error(
              `build.${process.env.EAS_PROFILE}.android.buildType must stay "apk" for this workflow. Current value: ${buildType}`,
            );
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `ANDROID_BUILD_TYPE=${buildType}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `EAS_ENVIRONMENT=${easEnvironment}\n`);
          NODE

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Trigger EAS Android production build
        working-directory: apps/mobile-app
        run: |
          eas build \
            --platform "$EAS_PLATFORM" \
            --profile "$EAS_PROFILE" \
            --non-interactive \
            --json | tee "$GITHUB_WORKSPACE/eas-production-build.json"

      - name: Capture production build metadata
        id: production_metadata
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const outputLines = [];
          const easPath = path.join(process.env.GITHUB_WORKSPACE, 'eas-production-build.json');

          if (fs.existsSync(easPath)) {
            const raw = JSON.parse(fs.readFileSync(easPath, 'utf8'));
            const first = Array.isArray(raw) ? raw[0] : raw;
            const build = Array.isArray(first?.builds) ? first.builds[0] : first;

            if (build?.id) {
              outputLines.push(`eas_build_id=${build.id}`);
            }

            const buildUrl = build?.buildDetailsPageUrl
              ?? build?.url
              ?? '';

            if (buildUrl) {
              outputLines.push(`eas_build_url=${buildUrl}`);
            }

            const artifactUrl = build?.artifacts?.applicationArchiveUrl
              ?? build?.artifacts?.buildUrl
              ?? '';

            if (artifactUrl) {
              outputLines.push(`eas_artifact_url=${artifactUrl}`);
            }

            if (build?.status) {
              outputLines.push(`eas_build_status=${build.status}`);
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${outputLines.join('\n')}\n`);
          NODE

      - name: Upload production build metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-mobile-build-${{ github.run_id }}
          path: eas-production-build.json

      - name: Write production mobile deployment summary
        env:
          EAS_ARTIFACT_URL: ${{ steps.production_metadata.outputs.eas_artifact_url }}
          EAS_BUILD_ID: ${{ steps.production_metadata.outputs.eas_build_id }}
          EAS_BUILD_STATUS: ${{ steps.production_metadata.outputs.eas_build_status }}
          EAS_BUILD_URL: ${{ steps.production_metadata.outputs.eas_build_url }}
        run: |
          {
            echo "## Production mobile APK build completed"
            echo
            echo "- Platform: ${EAS_PLATFORM}"
            echo "- Profile: ${EAS_PROFILE}"
            echo "- EAS environment: ${EAS_ENVIRONMENT:-Unavailable}"
            echo "- Android artifact type: ${ANDROID_BUILD_TYPE}"
            echo "- Build status: ${EAS_BUILD_STATUS:-Unavailable}"
            echo "- EAS build ID: ${EAS_BUILD_ID:-Unavailable}"
            echo "- EAS build details: ${EAS_BUILD_URL:-Unavailable}"
            echo "- Download URL: ${EAS_ARTIFACT_URL:-Unavailable}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Distribution mode: direct APK distribution only"
          } >> "$GITHUB_STEP_SUMMARY"