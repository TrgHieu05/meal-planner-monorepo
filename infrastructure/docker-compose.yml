services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main-backend
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Backend Service ---
  main-backend:
    image: main-backend:latest
    build:
      context: ../
      dockerfile: infrastructure/docker/main-backend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/meal_planner
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Database ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meal_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data: